name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  BUN_VERSION: '1.3.10'
  PHP_VERSION: '8.4'

jobs:
  ci:
    name: Lint, test, and build
    runs-on: arc-runner-set
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read project version
        id: project-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(head -n 1 version.txt | tr -d '\r')"
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          coverage: none
          extensions: curl, dom, mbstring, openssl
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Cache Bun downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Locate Composer cache
        id: composer-cache
        shell: bash
        run: |
          set -euo pipefail
          echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('core/php/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Bun dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Install Composer dependencies
        shell: bash
        run: |
          set -euo pipefail
          composer install \
            --working-dir core/php \
            --no-ansi \
            --no-interaction \
            --no-progress \
            --prefer-dist

      - name: Lint with ESLint
        shell: bash
        run: bun run lint:eslint

      - name: Lint with Prettier
        shell: bash
        run: bun run lint:prettier

      - name: Lint with PHPCS
        shell: bash
        run: bun run lint:phpcs

      - name: Lint with Stylelint
        shell: bash
        run: bun run lint:stylelint

      - name: Validate HTML
        continue-on-error: true
        shell: bash
        run: bun run lint:html-validator

      - name: Test
        shell: bash
        run: bun run test:all

      - name: Build
        shell: bash
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.project-version.outputs.value }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/public_html
            build/bun
