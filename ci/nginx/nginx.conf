worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_body_temp_path /tmp/client_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  proxy_temp_path /tmp/proxy_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  access_log /dev/stdout;
  error_log /dev/stderr warn;

  # When a clean URL ends with a slash, look for a same-name landing file
  # inside that directory, for example /en/experience/experience.html.
  map $uri $directory_landing_html {
    default "";
    ~^(?<prefix>.*/)?(?<name>[^/]+)/$ /$prefix$name/$name.html;
  }

  # Serve the localized 404 page that matches the current language prefix.
  map $uri $not_found_page {
    default /404.html;
    ~^/en(?:/|$) /en/404.html;
    ~^/fr(?:/|$) /fr/404.html;
  }

  server {
    listen 8080;
    server_name _;
    absolute_redirect off;
    port_in_redirect off;

    root /var/www/public_html;

    # Preserve the original 404 status code while rendering a built page.
    error_page 404 $not_found_page;

    # Directory index fallback used once Nginx resolves a directory URL.
    index index.html about.html;

    # 404 pages are only used internally through error_page.
    location = /404.html {
      internal;
    }

    location = /en/404.html {
      internal;
    }

    location = /fr/404.html {
      internal;
    }

    # Deny access to hidden files such as .htaccess, .git, .env, etc.
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Cache immutable frontend assets
    location ~* \.(?:css|ico|jpeg|jpg|js|png|svg|webp)$ {
      expires 7d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Pass PHP requests to the backend
    location ~ \.php$ {
      try_files $uri =404;
      include /etc/nginx/fastcgi_params;
      fastcgi_param SCRIPT_FILENAME /var/www/public_html$fastcgi_script_name;
      fastcgi_param PATH_INFO $fastcgi_path_info;
      fastcgi_param HTTP_PROXY "";
      fastcgi_pass backend:9000;
    }

    # Canonicalize duplicated basename URLs back to the directory form,
    # for example /en/experience/experience.html -> /en/experience/.
    location ~ ^(?<parent_path>.*/)(?<entry_name>[^/]+)/\k<entry_name>(?:\.html)?$ {
      return 308 $parent_path$entry_name/;
    }

    # Strip .html from direct file URLs to keep public URLs clean.
    location ~ ^(.+)\.html$ {
      return 308 $1;
    }

    # Resolve static files first, then clean URLs, then directory indexes.
    location / {
      try_files $uri $uri.html $directory_landing_html $uri/ =404;
    }
  }
}
