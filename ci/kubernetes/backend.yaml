apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secrets
  namespace: sebastienkeroack-dot-com
type: Opaque
stringData:
  RECAPTCHA_SECRET_KEY: '$RECAPTCHA_SECRET_KEY'
  SMTP_HOST: '$SMTP_HOST'
  SMTP_NAME: '$SMTP_NAME'
  SMTP_USERNAME: '$SMTP_USERNAME'
  SMTP_PASSWORD: '$SMTP_PASSWORD'
  SMTP_CONTACT_RECIPIENT: '$SMTP_CONTACT_RECIPIENT'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-backend
  namespace: sebastienkeroack-dot-com
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-backend
  template:
    metadata:
      labels:
        app: portfolio-backend
    spec:
      containers:
        - name: backend
          image: sebastienkeroack-portfolio-backend:$PROJECT_VERSION
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              name: fpm
          envFrom:
            - secretRef:
                name: portfolio-secrets
          readinessProbe:
            tcpSocket:
              port: fpm
          livenessProbe:
            tcpSocket:
              port: fpm
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-backend
  namespace: sebastienkeroack-dot-com
spec:
  selector:
    app: portfolio-backend
  ports:
    - name: fpm
      port: 9000
      targetPort: fpm
